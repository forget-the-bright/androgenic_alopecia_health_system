server:
  port: 8080
  servlet:
    context-path:
  #让 SpringBoot 信任 Nginx 传来的 HTTPS 和端口，跳转时自动使用正确协议 + 端口
  forward-headers-strategy: native

spring:
  application:
    name: androgenic-alopecia-health-system

  # 时区配置（统一使用 GMT+8 北京时间）
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

  # Spring MVC 路径匹配配置（解决 Swagger 兼容性问题）
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.3.199}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:hair_loss_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:ks125930.}

  #redis 配置
  redis:
    database: ${REDIS_DATABASE:6}
    host: ${REDIS_HOST:192.168.3.140}
    port: ${REDIS_PORT:30535}
    password: ''
    # Redis服务器连接密码（默认为空）
    # password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 200
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 10
        # 连接池中的最小空闲连接
        min-idle: 0

  # Thymeleaf 配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    check-template-location: true
    enabled: true
    servlet:
      content-type: text/html

  # 静态资源配置
  web:
    resources:
      static-locations: classpath:/static/

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 国际化配置
  messages:
    basename: i18n/messages
    encoding: UTF-8

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.hairloss.system.entity
  configuration:
    map-underscore-to-camel-case: true
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token 配置
sa-token:
  # token 名称
  token-name: satoken
  # token 有效期（秒）
  timeout: 7200
  # 临时 token 有效期
  activity-timeout: -1
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token
  is-share: true
  # token 风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # 是否从 cookie 中读取 token
  is-read-cookie: true
  # 是否从 header 中读取 token
  is-read-header: true
  # 未登录时的处理（禁用默认的 302 重定向）
  not-login-view: /api/not-login
  # 无权限时的处理
  no-auth-view: /api/no-auth

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}
    # 注意：官方说明中只要求password必填，但后面两项也要填上，否则出现错误
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator
# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:https://local.wuanwanghao.top:9000}
  access-key: ${MINIO_ACCESS_KEY:ENC(9YrhLGKAohMXuLOT0dhzRg==)}
  secret-key: ${MINIO_SECRET_KEY:ENC(u+j9NEKTWDJXi4tdezMS51NYvTNIUkh6)}
  bucket-name: ${MINIO_BUCKET_NAME:hairloss}

# AI 接口配置
ai:
  analysis:
    url: https://ark.cn-beijing.volces.com/api/v3
    model: doubao-seed-2-0-pro-260215
    key: ${DOUBAO_APIKEY:ENC(70v/fZrHVJgGXLobXi82zvcHkqnb8pLc15iKnu2tzLtD2CZP2b0Hvq3bqWE107bM)}

# 系统配置
system:
  upload:
    max-size: 10485760

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN

# Swagger 配置
swagger:
  title: 雄激素性脱发患者管理与分析系统 API 文档
  description: 提供毛发数据记录、AI 智能分析、用药管理等功能
  version: 1.0.0
  terms-of-service-url: http://localhost:8080
  contact:
    name: Hair Loss System
    email: support@hairloss.com
    url: http://localhost:8080

# 日志配置
logging:
  level:
    root: INFO
    com.hairloss.system: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

hao-util:
  enabled: true
  print-interface: true
  enable-failsafe: true
