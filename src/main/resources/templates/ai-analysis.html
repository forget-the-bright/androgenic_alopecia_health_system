<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对比分析 - 毛发健康管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        .main-content { padding: 20px; }
        
        /* 分析区域 */
        .analysis-input-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            color: var(--text-color);
        }
        
        /* 照片选择器 */
        .image-selector {
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            padding: 15px;
            min-height: 160px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .image-selector:hover {
            border-color: var(--primary-color);
            background: rgba(102, 126, 234, 0.05);
        }
        .image-selector.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            border-style: solid;
        }
        .image-selector img {
            max-width: 100%;
            max-height: 140px;
            border-radius: 8px;
            object-fit: contain;
        }
        .image-selector .placeholder {
            text-align: center;
            color: var(--text-muted);
        }
        .image-selector .placeholder i {
            font-size: 40px;
            margin-bottom: 8px;
            opacity: 0.5;
        }
        
        /* VS 徽章 */
        .vs-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.4);
        }
        
        /* 分析按钮 */
        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 35px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.3);
        }
        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-analyze:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 加载动画 */
        .loading-container {
            text-align: center;
            padding: 30px 20px;
        }
        .loading-spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 列表区域 */
        .analysis-list-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            color: var(--text-color);
        }
        
        /* 列表卡片 */
        .analysis-list-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .analysis-list-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }
        .analysis-list-card .score-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 18px;
            font-weight: bold;
            font-size: 15px;
            min-width: 65px;
            text-align: center;
            display: inline-block;
        }
        .analysis-list-card .trend-tag {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        .trend-改善 { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; }
        .trend-稳定 { background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%); color: #333; }
        .trend-加重 { background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); color: white; }
        
        /* 分页 */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
        }
        .pagination-container .page-size-label {
            font-size: 13px;
            color: var(--text-muted);
        }
        .pagination-container .page-size-select {
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            font-size: 13px;
        }
        
        /* 详情模态框（可拖动、最大化） */
        .detail-modal .modal-dialog {
            max-width: 850px;
            margin: 20px auto;
            transition: all 0.3s ease;
        }
        .detail-modal .modal-dialog.maximized {
            max-width: calc(100% - 40px);
            margin: 20px auto;
            height: calc(100vh - 40px);
        }
        .detail-modal .modal-content {
            border-radius: 15px;
            overflow: hidden;
            height: 100%;
        }
        .detail-modal .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 20px;
            cursor: move;
        }
        .detail-modal .modal-header .modal-actions {
            display: flex;
            gap: 8px;
        }
        .detail-modal .modal-header .modal-actions button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            line-height: 1;
        }
        .detail-modal .modal-header .modal-actions button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .detail-modal .modal-header .modal-actions .btn-maximize {
            background: rgba(255, 255, 255, 0.25);
        }
        .detail-modal .modal-body {
            padding: 0;
            height: calc(100vh - 250px);
            overflow-y: auto;
        }
        .detail-content {
            padding: 22px;
        }
        
        /* 照片选择模态框（可拖动、最大化，带日期筛选） */
        .image-select-modal .modal-dialog {
            max-width: 1000px;
            margin: 50px auto;
            transition: all 0.3s ease;
        }
        .image-select-modal .modal-dialog.maximized {
            max-width: calc(100% - 40px);
            margin: 20px auto;
            height: calc(100vh - 40px);
        }
        .image-select-modal .modal-content {
            border-radius: 15px;
            overflow: hidden;
            height: 100%;
        }
        .image-select-modal .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 20px;
            cursor: move;
        }
        .image-select-modal .modal-header .modal-actions {
            display: flex;
            gap: 8px;
        }
        .image-select-modal .modal-header .modal-actions button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            line-height: 1;
        }
        .image-select-modal .modal-header .modal-actions button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .image-select-modal .modal-header .modal-actions .btn-maximize {
            background: rgba(255, 255, 255, 0.25);
        }
        .image-select-modal .modal-body {
            padding: 20px;
            height: calc(100vh - 200px);
            overflow-y: auto;
        }
        
        /* 照片网格 - 修复变形 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        .image-item {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--card-bg);
        }
        .image-item:hover {
            border-color: #667eea;
            transform: scale(1.02);
        }
        .image-item img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: #f5f5f5;
            display: block;
        }
        .image-item-info {
            padding: 8px;
            font-size: 11px;
            text-align: center;
            background: var(--sidebar-bg);
        }
        .image-item-date {
            color: var(--text-muted);
            font-size: 10px;
            margin-top: 2px;
        }
        
        /* 日期筛选区域 */
        .date-filter-section {
            background: var(--sidebar-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .date-filter-section .filter-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-color);
        }
        .date-filter-section .form-control-sm,
        .date-filter-section .form-select-sm {
            font-size: 12px;
        }
        
        /* 结果头部 */
        .result-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 18px;
        }
        .score-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .score-value {
            font-size: 32px;
            font-weight: bold;
            line-height: 1;
        }
        
        /* 对比图片 */
        .compare-images {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            padding: 12px;
            background: var(--sidebar-bg);
            border-radius: 10px;
        }
        .compare-image-item {
            flex: 1;
            text-align: center;
        }
        .compare-image-item img {
            width: 100%;
            height: 130px;
            object-fit: contain;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: #f5f5f5;
        }
        .compare-image-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
        }
        .compare-image-time {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        /* 信息卡片 */
        .info-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .info-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
        }
        
        /* 基本信息网格 */
        .basic-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }
        .basic-info-item {
            background: var(--sidebar-bg);
            padding: 10px;
            border-radius: 8px;
        }
        .basic-info-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }
        .basic-info-value {
            font-size: 13px;
            font-weight: 500;
        }
        
        /* 趋势描述 */
        .trend-description {
            line-height: 1.6;
            padding: 10px;
            background: var(--sidebar-bg);
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        
        /* 关键变化列表 */
        .key-changes-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .key-changes-list li {
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
            font-size: 13px;
        }
        .key-changes-list li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #28a745;
            font-weight: bold;
        }
        
        /* 建议项 */
        .suggestion-item {
            padding: 10px;
            background: var(--sidebar-bg);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .suggestion-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .suggestion-text {
            font-size: 13px;
            line-height: 1.5;
        }
        
        /* 结论卡片 */
        .conclusion-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
        }
        .conclusion-content {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .conclusion-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .conclusion-text {
            font-size: 13px;
            line-height: 1.5;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 10px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .compare-images {
                flex-direction: column;
            }
            .result-header {
                padding: 18px;
            }
            .score-circle {
                width: 90px;
                height: 90px;
            }
            .score-value {
                font-size: 26px;
            }
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            .image-item img {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="sidebar-toggle me-2" onclick="toggleSidebar()" title="切换侧边栏">
                    <span class="toggle-icon">⬅️</span>
                </button>
                <a class="navbar-brand" href="/index.html">毛发健康管理系统</a>
            </div>

            <div class="d-flex align-items-center">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <span class="theme-icon">🌙</span>
                </button>
                <div class="language-selector ms-2">
                    <select onchange="setLanguage(this.value)">
                        <option value="zh-CN">🇨🇳 中文</option>
                        <option value="en-US">🇺🇸 English</option>
                    </select>
                </div>
                <a class="nav-link" href="#" onclick="doLogout()">🚪 退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar d-none d-md-block" id="sidebar">
                <nav class="nav flex-column">
                    <a class="nav-link" href="/index.html">
                        <span class="icon">📊</span>
                        <span class="text">数据概览</span>
                    </a>
                    <a class="nav-link" href="/hair-data.html">
                        <span class="icon">📷</span>
                        <span class="text">毛发数据</span>
                    </a>
                    <a class="nav-link active" href="/ai-analysis.html">
                        <span class="icon">🤖</span>
                        <span class="text">AI 分析</span>
                    </a>
                    <a class="nav-link" href="/medicine.html">
                        <span class="icon">💊</span>
                        <span class="text">用药管理</span>
                    </a>
                    <a class="nav-link" href="/profile.html">
                        <span class="icon">👤</span>
                        <span class="text">个人中心</span>
                    </a>
                    <a class="nav-link admin-link" href="/admin.html" style="display: none;">
                        <span class="icon">⚙️</span>
                        <span class="text">管理后台</span>
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 main-content">
                <h4 class="mb-3"><i class="bi bi-robot"></i> AI 对比分析</h4>

                <!-- 分析区域（上方） -->
                <div class="analysis-input-section">
                    <h5 class="mb-3"><i class="bi bi-images"></i> 选择照片进行分析</h5>
                    <p class="text-muted mb-3 small">请选择两张不同时间的照片进行对比分析（建议间隔 1 个月以上）</p>
                    
                    <div class="row align-items-center">
                        <div class="col-md-5">
                            <label class="form-label fw-bold small">
                                <i class="bi bi-calendar3"></i> 第一张照片（较早时间）
                            </label>
                            <div class="image-selector" id="selector1" onclick="selectImage(1)">
                                <div class="placeholder">
                                    <i class="bi bi-image"></i>
                                    <p class="small mb-0">点击选择照片</p>
                                </div>
                            </div>
                            <input type="hidden" id="imageId1">
                        </div>
                        
                        <div class="col-md-2 d-flex align-items-center justify-content-center">
                            <div class="vs-badge">VS</div>
                        </div>
                        
                        <div class="col-md-5">
                            <label class="form-label fw-bold small">
                                <i class="bi bi-calendar-check"></i> 第二张照片（较晚时间）
                            </label>
                            <div class="image-selector" id="selector2" onclick="selectImage(2)">
                                <div class="placeholder">
                                    <i class="bi bi-image"></i>
                                    <p class="small mb-0">点击选择照片</p>
                                </div>
                            </div>
                            <input type="hidden" id="imageId2">
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <button class="btn btn-primary btn-analyze" onclick="startAnalysis()" id="analyzeBtn">
                            <i class="bi bi-rocket-takeoff"></i> 开始 AI 分析
                        </button>
                    </div>
                    
                    <!-- 加载状态 -->
                    <div id="analyzeLoading" style="display: none;" class="loading-container">
                        <div class="loading-spinner"></div>
                        <p class="text-muted mb-0">AI 正在分析中，请稍候...</p>
                    </div>
                </div>

                <!-- 分析列表区域（下方） -->
                <div class="analysis-list-section">
                    <h5 class="mb-3"><i class="bi bi-list-ul"></i> 分析记录</h5>
                    <div id="analysisListContainer">
                        <div class="empty-state">
                            <i class="bi bi-hourglass-split"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                    
                    <!-- 分页控件 -->
                    <div class="pagination-container" id="paginationContainer" style="display: none;">
                        <span class="page-size-label">每页显示</span>
                        <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()">
                            <option value="5">5 条</option>
                            <option value="10" selected>10 条</option>
                            <option value="20">20 条</option>
                            <option value="50">50 条</option>
                        </select>
                        <span class="page-size-label">，共 <span id="totalRecords">0</span> 条记录</span>
                        <nav class="ms-auto">
                            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情模态框（可拖动、最大化） -->
    <div class="modal fade detail-modal" id="detailModal" tabindex="-1" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered" id="detailModalDialog">
            <div class="modal-content">
                <div class="modal-header" id="detailModalHeader">
                    <h5 class="modal-title"><i class="bi bi-file-earmark-text"></i> 分析报告详情</h5>
                    <div class="modal-actions">
                        <button type="button" class="btn-maximize" title="最大化" onclick="toggleMaximize('detail')">
                            <i class="bi bi-arrows-fullscreen"></i>
                        </button>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: brightness(0) invert(1);">
                            <i class="bi bi-x"></i>
                        </button>
                    </div>
                </div>
                <div class="modal-body">
                    <div id="detailContent" class="detail-content">
                        <!-- 动态加载 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 照片选择模态框（可拖动、最大化，带日期筛选） -->
    <div class="modal fade image-select-modal" id="imageSelectModal" tabindex="-1" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered" id="imageSelectModalDialog">
            <div class="modal-content">
                <div class="modal-header" id="imageSelectModalHeader">
                    <h5 class="modal-title"><i class="bi bi-images"></i> 选择照片</h5>
                    <div class="modal-actions">
                        <button type="button" class="btn-maximize" title="最大化" onclick="toggleMaximize('image')">
                            <i class="bi bi-arrows-fullscreen"></i>
                        </button>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="filter: brightness(0) invert(1);">
                            <i class="bi bi-x"></i>
                        </button>
                    </div>
                </div>
                <div class="modal-body">
                    <!-- 日期筛选区域 -->
                    <div class="date-filter-section">
                        <div class="filter-title"><i class="bi bi-funnel"></i> 筛选条件</div>
                        <div class="row g-2">
                            <div class="col-md-3">
                                <label class="form-label small mb-1">起始日期</label>
                                <input type="date" class="form-control form-control-sm" id="filterStartDate">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small mb-1">结束日期</label>
                                <input type="date" class="form-control form-control-sm" id="filterEndDate">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small mb-1">部位</label>
                                <select class="form-select form-select-sm" id="filterPart">
                                    <option value="">全部</option>
                                    <option value="头顶">头顶</option>
                                    <option value="前额">前额</option>
                                    <option value="两侧">两侧</option>
                                    <option value="发旋">发旋</option>
                                    <option value="鬓角">鬓角</option>
                                </select>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button class="btn btn-primary btn-sm w-100" onclick="applyFilter()">
                                    <i class="bi bi-search"></i> 筛选
                                </button>
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button class="btn btn-outline-secondary btn-sm w-100" onclick="resetFilter()">
                                    <i class="bi bi-arrow-counterclockwise"></i> 重置
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 照片网格 -->
                    <div class="image-grid" id="modalImageGrid"></div>
                    
                    <!-- 空状态 -->
                    <div id="imageEmptyState" class="empty-state" style="display: none;">
                        <i class="bi bi-inbox"></i>
                        <p>暂无照片</p>
                        <p class="small text-muted">请先在"毛发数据"页面上传照片</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/layout.js"></script>
    <script>
        var currentSelector = 0;
        var allImages = [];
        var filteredImages = [];
        var currentPage = 1;
        var totalPages = 1;
        var pageSize = 10;
        var totalRecords = 0;
        
        // 模态框拖动和最大化状态
        var modalState = {
            detail: { isMaximized: false, isDragging: false },
            image: { isMaximized: false, isDragging: false }
        };

        $(function() {
            checkLoginAsync(function() {
                loadAllImages();
                checkAdminLink();
                loadAnalysisList(1);
                initModalDraggable('detail');
                initModalDraggable('image');
            });
        });

        // 初始化模态框拖动
        function initModalDraggable(type) {
            var modalId = type === 'detail' ? '#detailModal' : '#imageSelectModal';
            var headerId = type === 'detail' ? '#detailModalHeader' : '#imageSelectModalHeader';
            
            $(headerId).on('mousedown', function(e) {
                if ($(e.target).closest('.modal-actions').length > 0) return;
                
                modalState[type].isDragging = true;
                var dialog = $(modalId + ' .modal-dialog');
                var modalContent = $(modalId + ' .modal-content');
                var offsetX = e.pageX - dialog.offset().left;
                var offsetY = e.pageY - dialog.offset().top;
                
                dialog.css({
                    margin: '0',
                    position: 'fixed',
                    left: (e.pageX - offsetX) + 'px',
                    top: (e.pageY - offsetY) + 'px'
                });
                
                $(document).on('mousemove', function(e) {
                    if (!modalState[type].isDragging) return;
                    dialog.css({
                        left: (e.pageX - offsetX) + 'px',
                        top: (e.pageY - offsetY) + 'px'
                    });
                });
                
                $(document).on('mouseup', function() {
                    modalState[type].isDragging = false;
                    $(document).off('mousemove');
                });
            });
        }

        // 切换最大化
        function toggleMaximize(type) {
            var modalId = type === 'detail' ? '#detailModal' : '#imageSelectModal';
            var dialog = $(modalId + ' .modal-dialog');
            var btn = dialog.find('.btn-maximize i');

            modalState[type].isMaximized = !modalState[type].isMaximized;

            if (modalState[type].isMaximized) {
                dialog.addClass('maximized');
                // 切换为还原图标（使用 bi-fullscreen-exit）
                btn.removeClass('bi-arrows-fullscreen').addClass('bi-fullscreen-exit');
            } else {
                dialog.removeClass('maximized');
                // 切换为最大化图标
                btn.removeClass('bi-fullscreen-exit').addClass('bi-arrows-fullscreen');
            }
        }

        // 加载所有照片
        function loadAllImages() {
            $.ajax({
                url: '/api/image/list',
                type: 'GET',
                headers: { 'satoken': getToken() },
                success: function(res) {
                    if (res.code === 200) {
                        allImages = res.data || [];
                        // 设置默认筛选范围为最近 15 天
                        setDefaultDateFilter();
                    }
                }
            });
        }

        // 设置默认日期筛选（最近 15 天）
        function setDefaultDateFilter() {
            var today = new Date();
            var fifteenDaysAgo = new Date(today.getTime() - 15 * 24 * 60 * 60 * 1000);
            
            var endDateStr = formatDateForInput(today);
            var startDateStr = formatDateForInput(fifteenDaysAgo);
            
            $('#filterStartDate').val(startDateStr);
            $('#filterEndDate').val(endDateStr);
            
            // 自动应用筛选
            applyFilter();
        }
        
        // 格式化日期为 input 格式
        function formatDateForInput(date) {
            var year = date.getFullYear();
            var month = ('0' + (date.getMonth() + 1)).slice(-2);
            var day = ('0' + date.getDate()).slice(-2);
            return year + '-' + month + '-' + day;
        }

        // 应用筛选
        function applyFilter() {
            var startDate = $('#filterStartDate').val();
            var endDate = $('#filterEndDate').val();
            var part = $('#filterPart').val();
            
            filteredImages = allImages.filter(function(img) {
                var imgDate = img.uploadDate;
                var passDate = true;
                var passPart = true;
                
                if (startDate && imgDate < startDate) passDate = false;
                if (endDate && imgDate > endDate) passDate = false;
                if (part && img.part !== part) passPart = false;
                
                return passDate && passPart;
            });
            
            renderImageGrid();
        }

        // 重置筛选
        function resetFilter() {
            $('#filterStartDate').val('');
            $('#filterEndDate').val('');
            $('#filterPart').val('');
            filteredImages = allImages;
            renderImageGrid();
        }

        // 渲染照片网格
        function renderImageGrid() {
            var html = '';
            
            if (filteredImages && filteredImages.length > 0) {
                // 按时间倒序排序
                filteredImages.sort(function(a, b) {
                    return new Date(b.uploadTime) - new Date(a.uploadTime);
                });
                
                filteredImages.forEach(function(img) {
                    html += `
                        <div class="image-item" onclick="confirmSelectImage(${img.id}, '${img.fileUrl}')">
                            <img src="${img.fileUrl}" alt="${img.part}" style="object-fit: contain;">
                            <div class="image-item-info">
                                <div><strong>${img.part}</strong></div>
                                <div class="image-item-date">${formatDateTime(img.uploadTime)}</div>
                            </div>
                        </div>
                    `;
                });
                
                $('#imageEmptyState').hide();
            } else {
                html = '';
                $('#imageEmptyState').show();
            }
            
            $('#modalImageGrid').html(html);
        }

        // 加载分析列表
        function loadAnalysisList(pageNum) {
            $.ajax({
                url: '/api/analysis/page?pageNum=' + pageNum + '&pageSize=' + pageSize,
                type: 'GET',
                headers: { 'satoken': getToken() },
                success: function(res) {
                    if (res.code === 200) {
                        var page = res.data;
                        currentPage = page.current;
                        totalPages = page.pages;
                        totalRecords = page.total;
                        
                        var html = '';
                        if (page.records && page.records.length > 0) {
                            page.records.forEach(function(item) {
                                var trendClass = 'trend-' + (item.trend || '稳定');
                                var timeStr = item.analysisTime ? item.analysisTime.replace('T', ' ').substring(0, 16) : '';
                                html += `
                                    <div class="analysis-list-card" onclick="viewDetail(${item.id})">
                                        <div class="row align-items-center">
                                            <div class="col-md-2">
                                                <span class="score-badge">${formatScore(item.score)}</span>
                                            </div>
                                            <div class="col-md-2">
                                                <span class="trend-tag ${trendClass}">${item.trend || '-'}</span>
                                            </div>
                                            <div class="col-md-2">
                                                <div class="small text-muted">分析部位</div>
                                                <div class="fw-bold">${item.analysisPart || '-'}</div>
                                            </div>
                                            <div class="col-md-2">
                                                <div class="small text-muted">时间间隔</div>
                                                <div class="fw-bold">${item.timeInterval || '-'}</div>
                                            </div>
                                            <div class="col-md-2">
                                                <div class="small text-muted">分析时间</div>
                                                <div class="fw-bold small">${timeStr}</div>
                                            </div>
                                            <div class="col-md-2 text-end">
                                                <button class="btn btn-sm btn-outline-primary">
                                                    <i class="bi bi-eye"></i> 查看
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            });
                        } else {
                            html = `
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>暂无分析记录</p>
                                    <p class="small text-muted">点击上方"开始 AI 分析"按钮创建第一条分析记录</p>
                                </div>
                            `;
                        }
                        $('#analysisListContainer').html(html);
                        
                        // 更新分页显示
                        $('#totalRecords').text(totalRecords);
                        if (totalPages > 1 || totalRecords > 0) {
                            $('#paginationContainer').show();
                            renderPagination(page.current, page.pages);
                        } else {
                            $('#paginationContainer').hide();
                        }
                    }
                }
            });
        }

        // 渲染分页
        function renderPagination(current, total) {
            var html = '';
            
            // 上一页
            if (current > 1) {
                html += '<li class="page-item"><a class="page-link" href="#" onclick="loadAnalysisList(' + (current - 1) + '); return false;">上一页</a></li>';
            } else {
                html += '<li class="page-item disabled"><span class="page-link">上一页</span></li>';
            }
            
            // 页码
            var start = Math.max(1, current - 2);
            var end = Math.min(total, current + 2);
            
            for (var i = start; i <= end; i++) {
                if (i === current) {
                    html += '<li class="page-item active"><span class="page-link">' + i + '</span></li>';
                } else {
                    html += '<li class="page-item"><a class="page-link" href="#" onclick="loadAnalysisList(' + i + '); return false;">' + i + '</a></li>';
                }
            }
            
            // 下一页
            if (current < total) {
                html += '<li class="page-item"><a class="page-link" href="#" onclick="loadAnalysisList(' + (current + 1) + '); return false;">下一页</a></li>';
            } else {
                html += '<li class="page-item disabled"><span class="page-link">下一页</span></li>';
            }
            
            $('#pagination').html(html);
        }

        // 改变每页大小
        function changePageSize() {
            pageSize = parseInt($('#pageSizeSelect').val());
            loadAnalysisList(1);
        }

        // 选择照片
        function selectImage(num) {
            currentSelector = num;
            // 直接显示已筛选的照片，不重置
            renderImageGrid();
            $('#imageSelectModal').modal('show');
        }

        // 确认选择照片
        function confirmSelectImage(id, url) {
            if (currentSelector === 1) {
                $('#imageId1').val(id);
                $('#selector1').html('<img src="' + url + '" alt="已选择" style="object-fit: contain;">');
                $('#selector1').addClass('selected');
            } else {
                $('#imageId2').val(id);
                $('#selector2').html('<img src="' + url + '" alt="已选择" style="object-fit: contain;">');
                $('#selector2').addClass('selected');
            }
            $('#imageSelectModal').modal('hide');
        }

        // 开始分析
        function startAnalysis() {
            var imageId1 = $('#imageId1').val();
            var imageId2 = $('#imageId2').val();

            if (!imageId1 || !imageId2) {
                showToast('请选择两张照片', 'warning');
                return;
            }

            if (imageId1 === imageId2) {
                showToast('请选择两张不同的照片', 'warning');
                return;
            }

            $('#analyzeBtn').prop('disabled', true);
            $('#analyzeLoading').show();

            $.ajax({
                url: '/api/analysis/analyze',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ 
                    imageId1: parseInt(imageId1), 
                    imageId2: parseInt(imageId2) 
                }),
                headers: { 'satoken': getToken() },
                success: function(res) {
                    $('#analyzeLoading').hide();
                    $('#analyzeBtn').prop('disabled', false);
                    
                    if (res.code === 200) {
                        showToast('分析完成', 'success');
                        // 清空选择
                        $('#selector1').html('<div class="placeholder"><i class="bi bi-image"></i><p class="small mb-0">点击选择照片</p></div>').removeClass('selected');
                        $('#selector2').html('<div class="placeholder"><i class="bi bi-image"></i><p class="small mb-0">点击选择照片</p></div>').removeClass('selected');
                        $('#imageId1').val('');
                        $('#imageId2').val('');
                        // 刷新列表并查看详情
                        loadAnalysisList(1);
                        viewDetail(res.data.id);
                    } else {
                        showToast(res.msg || '分析失败', 'danger');
                    }
                },
                error: function(xhr) {
                    $('#analyzeLoading').hide();
                    $('#analyzeBtn').prop('disabled', false);
                    showToast('分析失败：' + (xhr.responseJSON?.msg || '网络错误'), 'danger');
                }
            });
        }

        // 查看详情
        function viewDetail(id) {
            $.ajax({
                url: '/api/analysis/' + id,
                type: 'GET',
                headers: { 'satoken': getToken() },
                success: function(res) {
                    if (res.code === 200) {
                        showDetail(res.data);
                    }
                }
            });
        }

        // 显示详情
        function showDetail(data) {
            var html = '';
            
            // 结果头部
            html += '<div class="result-header">';
            html += '<div class="row align-items-center">';
            html += '<div class="col-md-4 text-center">';
            html += '<div class="score-circle">';
            html += '<span class="score-value">' + formatScore(data.score) + '</span>';
            html += '<span class="score-label" style="font-size: 12px;">综合评分</span>';
            html += '</div></div>';
            html += '<div class="col-md-4 text-center">';
            html += '<span class="trend-badge trend-' + (data.trend || '稳定') + '" style="font-size: 16px; padding: 8px 20px;">';
            html += (data.trend || '-');
            html += '</span>';
            html += '<div class="mt-3" style="opacity: 0.9; font-size: 13px;">变化趋势</div>';
            html += '</div>';
            html += '<div class="col-md-4 text-center">';
            html += '<div style="font-size: 15px; margin-bottom: 5px;">' + formatDateTime(data.analysisTime) + '</div>';
            html += '<div style="opacity: 0.9; font-size: 13px;">分析时间</div>';
            html += '</div></div>';
            
            // 子评分
            html += '<div class="row mt-3">';
            html += '<div class="col-6 text-center">';
            html += '<div style="font-size: 18px; font-weight: bold;">' + (data.hairDensityScore || '-') + '</div>';
            html += '<div style="font-size: 12px; opacity: 0.9;">毛发密度评分</div>';
            html += '</div>';
            html += '<div class="col-6 text-center">';
            html += '<div style="font-size: 18px; font-weight: bold;">' + (data.hairLossImproveScore || '-') + '</div>';
            html += '<div style="font-size: 12px; opacity: 0.9;">脱发改善评分</div>';
            html += '</div></div></div>';
            
            // 对比图片
            if (data.imageUrl1 && data.imageUrl2) {
                html += '<div class="compare-images">';
                html += '<div class="compare-image-item">';
                html += '<img src="' + data.imageUrl1 + '" alt="图片 1" style="object-fit: contain;">';
                html += '<div class="compare-image-label">' + (data.imagePart1 || '图片 1') + '</div>';
                html += '<div class="compare-image-time">' + formatDateTime(data.imageTime1) + '</div>';
                html += '</div>';
                html += '<div class="d-flex align-items-center justify-content-center">';
                html += '<div class="vs-badge">VS</div>';
                html += '</div>';
                html += '<div class="compare-image-item">';
                html += '<img src="' + data.imageUrl2 + '" alt="图片 2" style="object-fit: contain;">';
                html += '<div class="compare-image-label">' + (data.imagePart2 || '图片 2') + '</div>';
                html += '<div class="compare-image-time">' + formatDateTime(data.imageTime2) + '</div>';
                html += '</div></div>';
            }
            
            // 基本信息
            html += '<div class="info-card">';
            html += '<div class="info-card-title"><i class="bi bi-info-circle"></i> 基本信息</div>';
            html += '<div class="basic-info-grid">';
            html += '<div class="basic-info-item">';
            html += '<div class="basic-info-label">分析部位</div>';
            html += '<div class="basic-info-value">' + (data.analysisPart || '-') + '</div>';
            html += '</div>';
            html += '<div class="basic-info-item">';
            html += '<div class="basic-info-label">时间间隔</div>';
            html += '<div class="basic-info-value">' + (data.timeInterval || '-') + '</div>';
            html += '</div></div></div>';
            
            // 趋势分析
            html += '<div class="info-card">';
            html += '<div class="info-card-title"><i class="bi bi-graph-up-arrow"></i> 趋势分析</div>';
            html += '<div class="trend-description">' + (data.trendDescription || '暂无详细描述') + '</div>';
            html += '</div>';
            
            // 详细分析
            html += '<div class="info-card">';
            html += '<div class="info-card-title"><i class="bi bi-search"></i> 详细分析</div>';
            html += '<h6 class="fw-bold mb-2" style="font-size: 13px;">对比分析结果</h6>';
            html += '<p class="text-muted mb-3" style="font-size: 13px; line-height: 1.5;">' + (data.compareResult || '-') + '</p>';
            html += '<h6 class="fw-bold mb-2" style="font-size: 13px;">关键变化点</h6>';
            html += '<ul class="key-changes-list">' + parseKeyChanges(data.keyChanges) + '</ul>';
            html += '</div>';
            
            // 专业建议
            html += '<div class="info-card">';
            html += '<div class="info-card-title"><i class="bi bi-heart-pulse"></i> 专业建议</div>';
            html += '<div class="suggestion-item">';
            html += '<div class="suggestion-label"><i class="bi bi-prescription"></i> 治疗方案</div>';
            html += '<div class="suggestion-text">' + (data.treatmentSuggestion || '-') + '</div>';
            html += '</div>';
            html += '<div class="suggestion-item">';
            html += '<div class="suggestion-label"><i class="bi bi-stars"></i> 日常护理</div>';
            html += '<div class="suggestion-text" style="white-space: pre-line;">' + (data.dailyCare || '-') + '</div>';
            html += '</div>';
            html += '<div class="suggestion-item">';
            html += '<div class="suggestion-label"><i class="bi bi-compass"></i> 下一步建议</div>';
            html += '<div class="suggestion-text">' + (data.nextStep || '-') + '</div>';
            html += '</div></div>';
            
            // 总体结论
            html += '<div class="conclusion-card">';
            html += '<div class="conclusion-content">';
            html += '<i class="bi bi-chat-dots conclusion-icon"></i>';
            html += '<div>';
            html += '<strong style="display: block; margin-bottom: 5px; font-size: 13px;">总体结论</strong>';
            html += '<span class="conclusion-text">' + (data.conclusion || '-') + '</span>';
            html += '</div></div></div>';
            
            $('#detailContent').html(html);
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }

        // 格式化评分
        function formatScore(score) {
            if (!score) return '0';
            return typeof score === 'number' ? score.toFixed(1) : score;
        }

        // 解析关键变化点
        function parseKeyChanges(text) {
            if (!text) return '<li>暂无数据</li>';
            
            var lines = text.split('\n').filter(function(line) {
                return line.trim().length > 0;
            });
            
            if (lines.length === 0) return '<li>暂无数据</li>';
            
            var html = '';
            lines.forEach(function(line) {
                var content = line.replace(/^\d+\.\s*/, '').trim();
                if (content) {
                    html += '<li>' + content + '</li>';
                }
            });
            
            return html;
        }
    </script>
</body>
</html>
