<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.register.title}">用户注册</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/static/css/common.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }
        .register-container {
            max-width: 500px;
            width: 100%;
        }
        .register-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .form-group label {
            font-weight: 500;
            color: #555;
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            font-size: 16px;
            width: 100%;
            border-radius: 5px;
        }
        .btn-register:hover {
            opacity: 0.9;
            color: white;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .language-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .language-switch a {
            color: white;
            margin: 0 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="language-switch">
        <a href="?lang=zh-CN">中文</a> | <a href="?lang=en-US">English</a>
    </div>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1 th:text="#{page.register.title}">用户注册</h1>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username" th:text="#{page.register.username}">用户名</label>
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password" th:text="#{page.register.password}">密码</label>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="请输入密码（至少 6 位）" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword" th:text="#{page.register.confirmPassword}">确认密码</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                           placeholder="请再次输入密码" required>
                </div>
                <div class="form-group">
                    <label for="realName" th:text="#{page.register.realName}">真实姓名</label>
                    <input type="text" class="form-control" id="realName" name="realName" 
                           placeholder="请输入真实姓名">
                </div>
                <div class="form-group">
                    <label for="phone" th:text="#{page.register.phone}">手机号</label>
                    <input type="tel" class="form-control" id="phone" name="phone" 
                           placeholder="请输入手机号" pattern="[0-9]{11}">
                </div>
                <div class="form-group">
                    <label for="email" th:text="#{page.register.email}">邮箱</label>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="请输入邮箱">
                </div>
                <button type="submit" class="btn btn-register" th:text="#{page.register.button}">注册</button>
            </form>
            <div class="login-link">
                <span th:text="#{page.register.haveAccount}">已有账号？</span>
                <a th:href="@{/login.html}" th:text="#{page.login.title}">立即登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script th:src="@{/static/js/api.js}"></script>
    <script th:src="@{/static/js/common.js}"></script>
    <script>
        $(function() {
            $('#registerForm').submit(function(e) {
                e.preventDefault();
                
                var password = $('#password').val();
                var confirmPassword = $('#confirmPassword').val();
                
                if (password !== confirmPassword) {
                    showError('两次输入的密码不一致');
                    return;
                }

                if (password.length < 6) {
                    showError('密码长度至少 6 位');
                    return;
                }

                var data = {
                    username: $('#username').val(),
                    password: password,
                    realName: $('#realName').val(),
                    phone: $('#phone').val(),
                    email: $('#email').val()
                };

                $.ajax({
                    url: '/api/register',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    success: function(res) {
                        if (res.code === 200) {
                            showSuccess('注册成功，即将跳转到登录页面', function() {
                                window.location.href = '/login.html';
                            });
                        } else {
                            showError(res.msg || '注册失败');
                        }
                    },
                    error: function(xhr) {
                        showError('注册失败：' + (xhr.responseJSON?.msg || '网络错误'));
                    }
                });
            });
        });
    </script>
</body>
</html>
