<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 毛发健康管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        .main-content { padding: 20px; }
        .profile-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            color: var(--text-color);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            margin: 0 auto 20px;
        }
        .modal-header {
            background: var(--primary-gradient);
            color: white;
        }
        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="sidebar-toggle me-2" onclick="toggleSidebar()" title="切换侧边栏">
                    <span class="toggle-icon">⬅️</span>
                </button>
                <a class="navbar-brand" href="/index.html">毛发健康管理系统</a>
            </div>
            
            <div class="d-flex align-items-center">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <span class="theme-icon">🌙</span>
                </button>
                <div class="language-selector ms-2">
                    <select onchange="setLanguage(this.value)">
                        <option value="zh-CN">🇨n 中文</option>
                        <option value="en-US">🇺s English</option>
                    </select>
                </div>
                <a class="nav-link" href="#" onclick="doLogout()">🚪 退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar d-none d-md-block">
                <nav class="nav flex-column">
                    <a class="nav-link" href="/index.html">
                        <span class="icon">📊</span>
                        <span class="text">数据概览</span>
                    </a>
                    <a class="nav-link" href="/hair-data.html">
                        <span class="icon">📷</span>
                        <span class="text">毛发数据</span>
                    </a>
                    <a class="nav-link" href="/ai-analysis.html">
                        <span class="icon">🤖</span>
                        <span class="text">AI 分析</span>
                    </a>
                    <a class="nav-link" href="/medicine.html">
                        <span class="icon">💊</span>
                        <span class="text">用药管理</span>
                    </a>
                    <a class="nav-link active" href="/profile.html">
                        <span class="icon">👤</span>
                        <span class="text">个人中心</span>
                    </a>
                    <a class="nav-link admin-link" href="/admin.html" style="display: none;">
                        <span class="icon">⚙️</span>
                        <span class="text">管理后台</span>
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 main-content">
                <h4 class="mb-3">👤 个人中心</h4>

                <div class="row">
                    <div class="col-md-4">
                        <div class="profile-card text-center">
                            <div class="avatar" id="avatarText">U</div>
                            <h4 id="profileName">-</h4>
                            <p class="text-muted" id="profileUsername">-</p>
                            <span class="badge bg-primary" id="profileRole">普通用户</span>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="profile-card">
                            <h5>📋 基本信息</h5>
                            <form id="profileForm" class="mt-4">
                                <div class="mb-3">
                                    <label class="form-label">用户名</label>
                                    <input type="text" class="form-control" id="username" disabled>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">真实姓名</label>
                                    <input type="text" class="form-control" id="realName">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">手机号</label>
                                    <input type="text" class="form-control" id="phone">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">邮箱</label>
                                    <input type="email" class="form-control" id="email">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">语言偏好</label>
                                    <select class="form-select" id="language">
                                        <option value="zh-CN">中文</option>
                                        <option value="en-US">English</option>
                                    </select>
                                </div>
                                <button type="button" class="btn btn-primary" onclick="updateProfile()">💾 保存修改</button>
                            </form>
                        </div>

                        <div class="profile-card">
                            <h5>🔒 修改密码</h5>
                            <form class="mt-4">
                                <div class="mb-3">
                                    <label class="form-label">原密码</label>
                                    <input type="password" class="form-control" id="oldPassword">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">新密码</label>
                                    <input type="password" class="form-control" id="newPassword">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">确认密码</label>
                                    <input type="password" class="form-control" id="confirmPassword">
                                </div>
                                <button type="button" class="btn btn-warning" onclick="changePassword()">🔑 修改密码</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/layout.js"></script>
    <script>
        $(function() {
            checkLoginAsync(function(userInfo) {
                loadProfile(userInfo);
                checkAdminLink();
            });
        });

        function loadProfile(userInfo) {
            $('#username').val(userInfo.username || '-');
            $('#realName').val(userInfo.realName || '');
            $('#phone').val(userInfo.phone || '');
            $('#email').val(userInfo.email || '');
            $('#language').val(userInfo.language || 'zh-CN');
            
            $('#profileName').text(userInfo.realName || userInfo.username || '-');
            $('#profileUsername').text('@' + (userInfo.username || '-'));
            $('#profileRole').text(userInfo.role === 1 ? '管理员' : '普通用户');
            
            var initial = (userInfo.realName || userInfo.username || 'U').charAt(0).toUpperCase();
            $('#avatarText').text(initial);
        }

        function updateProfile() {
            var data = {
                realName: $('#realName').val(),
                phone: $('#phone').val(),
                email: $('#email').val(),
                language: $('#language').val()
            };

            $.ajax({
                url: '/api/user/info',
                type: 'GET',
                headers: { 'satoken': getToken() },
                success: function(res) {
                    if (res.code === 200) {
                        data.id = res.data.id;
                        
                        $.ajax({
                            url: '/api/user/update-language',
                            type: 'POST',
                            contentType: 'application/json',
                            data: JSON.stringify({ language: data.language }),
                            headers: { 'satoken': getToken() },
                            success: function(res) {
                                if (res.code === 200) {
                                    userInfo.language = data.language;
                                    localStorage.setItem('userInfo', JSON.stringify(userInfo));
                                    alert('✅ 保存成功');
                                }
                            }
                        });
                    }
                }
            });
        }

        function changePassword() {
            var oldPassword = $('#oldPassword').val();
            var newPassword = $('#newPassword').val();
            var confirmPassword = $('#confirmPassword').val();

            if (!oldPassword || !newPassword) {
                alert('请填写密码');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            if (newPassword.length < 6) {
                alert('密码长度至少 6 位');
                return;
            }

            $.ajax({
                url: '/api/user/change-password',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    oldPassword: oldPassword,
                    newPassword: newPassword,
                    confirmPassword: confirmPassword
                }),
                headers: { 'satoken': getToken() },
                success: function(res) {
                    if (res.code === 200) {
                        alert('✅ 密码修改成功，请重新登录');
                        doLogout();
                    } else {
                        alert('❌ ' + (res.msg || '修改失败'));
                    }
                },
                error: function(xhr) {
                    alert('❌ 修改失败：' + (xhr.responseJSON?.msg || '网络错误'));
                }
            });
        }
    </script>
</body>
</html>
