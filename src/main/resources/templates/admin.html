<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 毛发健康管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .main-content {
            padding: 20px;
        }
        .admin-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }
        .config-item {
            border-bottom: 1px solid #eee;
            padding: 12px 0;
        }
        .config-item:last-child {
            border-bottom: none;
        }
        .config-key {
            font-weight: bold;
            color: #667eea;
        }
        .user-detail-section {
            display: none;
        }
        .user-detail-section.show {
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="sidebar-toggle me-2" onclick="toggleSidebar()" title="切换侧边栏">
                    <span class="toggle-icon">⬅️</span>
                </button>
                <a class="navbar-brand" href="/index.html">毛发健康管理系统 - 管理后台</a>
            </div>
            
            <div class="d-flex align-items-center">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <span class="theme-icon">🌙</span>
                </button>
                <div class="language-selector ms-2">
                    <select onchange="setLanguage(this.value)">
                        <option value="zh-CN">🇨n 中文</option>
                        <option value="en-US">🇺s English</option>
                    </select>
                </div>
                <a class="nav-link" href="/index.html">🏠 首页</a>
                <a class="nav-link" href="#" onclick="doLogout()">🚪 退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar d-none d-md-block">
                <nav class="nav flex-column">
                    <a class="nav-link" href="/index.html">
                        <span class="icon">📊</span>
                        <span class="text">返回首页</span>
                    </a>
                    <a class="nav-link active" href="/admin.html">
                        <span class="icon">⚙️</span>
                        <span class="text">管理后台</span>
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 main-content">
                <h4 class="mb-3">⚙️ 管理后台</h4>

                <!-- 统计概览 -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="stat-number" id="userCount">0</div>
                            <div>用户总数</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="stat-number" id="photoCount">0</div>
                            <div>照片总数</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="stat-number" id="analysisCount">0</div>
                            <div>分析次数</div>
                        </div>
                    </div>
                </div>

                <!-- 用户管理 -->
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5>👥 用户管理</h5>
                        <input type="text" class="form-control w-25 form-control-sm" id="searchUsername" placeholder="搜索用户名">
                    </div>
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>姓名</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                    <nav>
                        <ul class="pagination justify-content-center" id="userPagination">
                            <!-- 动态加载 -->
                        </ul>
                    </nav>
                </div>

                <!-- 用户详情模态框 -->
                <div class="modal fade" id="userDetailModal" tabindex="-1">
                    <div class="modal-dialog modal-xl modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">📋 用户详情 - <span id="detailUsername"></span></h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row mb-3">
                                    <div class="col-md-4">
                                        <div class="stat-card">
                                            <div class="stat-number" id="detailPhotoCount">0</div>
                                            <div>照片数</div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="stat-card">
                                            <div class="stat-number" id="detailAnalysisCount">0</div>
                                            <div>分析次数</div>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="stat-card">
                                            <div class="stat-number" id="detailClockDays">0</div>
                                            <div>连续打卡天数</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <ul class="nav nav-tabs mb-3" id="userDetailTabs">
                                    <li class="nav-item">
                                        <a class="nav-link active" href="#" onclick="showUserTab('photos'); return false;">📷 照片列表</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#" onclick="showUserTab('analyses'); return false;">🤖 分析记录</a>
                                    </li>
                                </ul>
                                
                                <div id="userPhotosTab">
                                    <div class="table-responsive">
                                        <table class="table table-hover">
                                            <thead>
                                                <tr>
                                                    <th>ID</th>
                                                    <th>部位</th>
                                                    <th>上传日期</th>
                                                    <th>备注</th>
                                                    <th>操作</th>
                                                </tr>
                                            </thead>
                                            <tbody id="userPhotosBody"></tbody>
                                        </table>
                                    </div>
                                </div>
                                
                                <div id="userAnalysesTab" style="display: none;">
                                    <div class="table-responsive">
                                        <table class="table table-hover">
                                            <thead>
                                                <tr>
                                                    <th>ID</th>
                                                    <th>评分</th>
                                                    <th>趋势</th>
                                                    <th>分析时间</th>
                                                    <th>操作</th>
                                                </tr>
                                            </thead>
                                            <tbody id="userAnalysesBody"></tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 系统配置 -->
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5>⚙️ 系统配置</h5>
                        <button class="btn btn-sm btn-primary" onclick="openAddConfigModal()">➕ 新增配置</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>配置键</th>
                                    <th>配置值</th>
                                    <th>类型</th>
                                    <th>说明</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="configTableBody">
                                <!-- 动态加载 -->
                            </tbody>
                        </table>
                    </div>
                    <nav>
                        <ul class="pagination justify-content-center" id="configPagination">
                            <!-- 动态加载 -->
                        </ul>
                    </nav>
                </div>

                <!-- 操作日志 -->
                <div class="admin-card">
                    <h5>📜 操作日志</h5>
                    <table class="table table-sm mt-3">
                        <thead>
                            <tr>
                                <th>用户</th>
                                <th>操作类型</th>
                                <th>描述</th>
                                <th>IP</th>
                                <th>时间</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑配置模态框 -->
    <div class="modal fade" id="configModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="configModalTitle">新增配置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="configForm">
                        <input type="hidden" id="configId">
                        <div class="mb-3">
                            <label class="form-label">配置键 *</label>
                            <input type="text" class="form-control" id="configKey" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">配置值 *</label>
                            <textarea class="form-control" id="configValue" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">类型</label>
                            <select class="form-select" id="configType">
                                <option value="system">系统配置</option>
                                <option value="minio">MinIO 配置</option>
                                <option value="ai">AI 配置</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">说明</label>
                            <input type="text" class="form-control" id="configRemark">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveConfig()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 查看分析详情模态框 -->
    <div class="modal fade" id="analysisModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📊 分析报告详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="analysisDetail"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="/static/js/api.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        var currentPage = 1;
        var currentConfigPage = 1;
        var currentUserId = null;
        var configModal = null;
        var userDetailModal = null;

        $(function() {
            checkLoginAsync(function(userInfo) {
                if (userInfo.role !== 1) {
                    showWarning('无权限访问管理后台');
                    window.location.href = '/index.html';
                    return;
                }
                configModal = new bootstrap.Modal(document.getElementById('configModal'));
                userDetailModal = new bootstrap.Modal(document.getElementById('userDetailModal'));
                loadStatistics();
                loadUsers();
                loadConfigs();
                loadLogs();
                checkAdminLink();
            });
        });

        // 加载统计数据
        function loadStatistics() {
            apiGet('/api/admin/statistics', function(res) {
                if (res.code === 200) {
                    $('#userCount').text(res.data.userCount || 0);
                    $('#photoCount').text(res.data.photoCount || 0);
                    $('#analysisCount').text(res.data.analysisCount || 0);
                }
            });
        }

        // 加载用户列表
        function loadUsers(page) {
            page = page || 1;
            var username = $('#searchUsername').val();

            apiGet('/api/admin/user/list?pageNum=' + page + '&pageSize=10' + (username ? '&username=' + username : ''), function(res) {
                if (res.code === 200) {
                    var html = '';
                    var data = res.data;
                    if (data && data.records) {
                        data.records.forEach(function(user) {
                            var statusHtml = user.status === 1
                                ? '<span class="badge bg-success">启用</span>'
                                : '<span class="badge bg-secondary">禁用</span>';
                            var roleHtml = user.role === 1
                                ? '<span class="badge bg-primary">管理员</span>'
                                : '<span class="badge bg-info">用户</span>';
                            html += `
                                <tr>
                                    <td>${user.id}</td>
                                    <td>${user.username}</td>
                                    <td>${user.realName || '-'}</td>
                                    <td>${roleHtml}</td>
                                    <td>${statusHtml}</td>
                                    <td>${user.createTime ? user.createTime.substring(0, 16) : ''}</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-info" onclick="viewUserDetail(${user.id})">📋 详情</button>
                                        <button class="btn btn-sm btn-outline-${user.status === 1 ? 'warning' : 'success'}"
                                                onclick="toggleUserStatus(${user.id}, ${user.status === 1 ? 0 : 1})">
                                            ${user.status === 1 ? '禁用' : '启用'}
                                        </button>
                                        <button class="btn btn-sm btn-outline-primary"
                                                onclick="openResetPassword(${user.id})">
                                            🔑 重置密码
                                        </button>
                                    </td>
                                </tr>
                            `;
                        });
                    }
                    $('#userTableBody').html(html);
                    renderPagination(data.current, data.size, data.total, 'userPagination', loadUsers);
                }
            });
        }

        // 查看用户详情（模态框）
        function viewUserDetail(userId) {
            currentUserId = userId;

            apiGet('/api/admin/user/' + userId, function(res) {
                if (res.code === 200) {
                    var user = res.data.user;
                    $('#detailUsername').text(user.username + ' (' + (user.realName || '-') + ')');
                    $('#detailPhotoCount').text(res.data.photoCount || 0);
                    $('#detailAnalysisCount').text(res.data.analysisCount || 0);
                    $('#detailClockDays').text('0'); // 暂时显示 0，需要额外接口获取

                    // 重置标签页
                    showUserTab('photos');

                    // 显示模态框
                    userDetailModal.show();
                }
            });
        }

        // 关闭用户详情模态框
        function closeUserDetail() {
            userDetailModal.hide();
            currentUserId = null;
        }

        // 切换用户详情标签页
        function showUserTab(tab) {
            $('#userDetailTabs .nav-link').removeClass('active');
            if (tab === 'photos') {
                $('#userDetailTabs .nav-link').first().addClass('active');
                $('#userPhotosTab').show();
                $('#userAnalysesTab').hide();
                if (currentUserId) loadUserPhotos(currentUserId);
            } else {
                $('#userDetailTabs .nav-link').last().addClass('active');
                $('#userPhotosTab').hide();
                $('#userAnalysesTab').show();
                if (currentUserId) loadUserAnalyses(currentUserId);
            }
        }

        // 加载用户照片
        function loadUserPhotos(userId) {
            apiGet('/api/admin/user/' + userId + '/images', function(res) {
                var html = '';
                if (res.code === 200 && res.data && res.data.length > 0) {
                    res.data.forEach(function(img) {
                        html += `
                            <tr>
                                <td>${img.id}</td>
                                <td><span class="badge bg-primary">${img.part}</span></td>
                                <td>${img.uploadDate}</td>
                                <td>${img.remark || '-'}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" onclick="previewImage('${img.fileUrl}')">👁️ 预览</button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    html = '<tr><td colspan="5" class="text-center text-muted">暂无照片</td></tr>';
                }
                $('#userPhotosBody').html(html);
            });
        }

        // 加载用户分析记录
        function loadUserAnalyses(userId) {
            apiGet('/api/admin/user/' + userId + '/analyses', function(res) {
                var html = '';
                if (res.code === 200 && res.data && res.data.length > 0) {
                    res.data.forEach(function(a) {
                        var trendClass = a.trend === '改善' ? 'bg-success' : a.trend === '稳定' ? 'bg-warning' : 'bg-danger';
                        html += `
                            <tr>
                                <td>${a.id}</td>
                                <td>${a.score}</td>
                                <td><span class="badge ${trendClass}">${a.trend}</span></td>
                                <td>${a.analysisTime ? a.analysisTime.substring(0, 16) : ''}</td>
                                <td><button class="btn btn-sm btn-outline-primary" onclick="viewAnalysisDetail(${a.id})">📄 查看</button></td>
                            </tr>
                        `;
                    });
                } else {
                    html = '<tr><td colspan="5" class="text-center text-muted">暂无分析记录</td></tr>';
                }
                $('#userAnalysesBody').html(html);
            });
        }

        // 预览图片
        function previewImage(url) {
            window.open(url, '_blank');
        }

        // 查看分析详情
        function viewAnalysisDetail(id) {
            apiGet('/api/analysis/' + id, function(res) {
                if (res.code === 200) {
                    var a = res.data;
                    var html = `
                        <div class="mb-3">
                            <strong>评分：</strong>${a.score}
                        </div>
                        <div class="mb-3">
                            <strong>趋势：</strong>${a.trend}
                        </div>
                        <div class="mb-3">
                            <strong>分析时间：</strong>${a.analysisTime ? a.analysisTime.substring(0, 19) : ''}
                        </div>
                        <div class="mb-3">
                            <strong>报告内容：</strong>
                            <pre style="white-space: pre-wrap; background: #f8f9fa; padding: 15px; border-radius: 5px;">${a.reportContent}</pre>
                        </div>
                    `;
                    $('#analysisDetail').html(html);
                    new bootstrap.Modal(document.getElementById('analysisModal')).show();
                }
            });
        }

        // 切换用户状态
        function toggleUserStatus(userId, status) {
            var action = status === 1 ? '启用' : '禁用';
            showConfirm('确定要' + action + '该用户吗？', '确认操作', function() {
                apiPost('/api/admin/user/status', { userId: userId, status: status }, function(res) {
                    if (res.code === 200) {
                        showSuccess('操作成功');
                        loadUsers();
                    } else {
                        showError(res.msg || '操作失败');
                    }
                });
            });
        }

        // 重置密码
        var resetUserId = null;
        function openResetPassword(userId) {
            resetUserId = userId;
            Swal.fire({
                title: '重置密码',
                input: 'text',
                inputLabel: '请输入新密码',
                inputPlaceholder: '新密码',
                showCancelButton: true,
                confirmButtonText: '确定',
                cancelButtonText: '取消',
                confirmButtonColor: '#667eea',
                inputValidator: function(value) {
                    if (!value) {
                        return '请输入新密码';
                    }
                }
            }).then(function(result) {
                if (result.isConfirmed) {
                    var newPassword = result.value;
                    apiPost('/api/admin/user/reset-password', { userId: resetUserId, newPassword: newPassword }, function(res) {
                        if (res.code === 200) {
                            showSuccess('密码已重置为：' + newPassword);
                        } else {
                            showError(res.msg || '操作失败');
                        }
                    });
                }
            });
        }

        // 渲染分页
        function renderPagination(current, size, total, elementId, callback) {
            var totalPages = Math.ceil(total / size);
            var html = '';
            for (var i = 1; i <= totalPages; i++) {
                html += '<li class="page-item ' + (i === current ? 'active' : '') + '">' +
                        '<a class="page-link" href="#" onclick="' + callback.name + '(' + i + ')">' + i + '</a>' +
                        '</li>';
            }
            $('#' + elementId).html(html);
        }

        // 加载系统配置
        function loadConfigs(page) {
            page = page || 1;
            currentConfigPage = page;

            apiGet('/api/admin/config/list?pageNum=' + page + '&pageSize=10', function(res) {
                if (res.code === 200) {
                    var html = '';
                    var data = res.data;
                    if (data && data.records) {
                        data.records.forEach(function(config) {
                            html += `
                                <tr>
                                    <td class="config-key">${config.configKey}</td>
                                    <td>${config.configValue}</td>
                                    <td>${config.configType || '-'}</td>
                                    <td>${config.remark || '-'}</td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary" onclick="openEditConfigModal(${config.id}, '${config.configKey}', '${config.configValue}', '${config.configType || ''}', '${config.remark || ''}')">✏️ 编辑</button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteConfig(${config.id})">🗑️ 删除</button>
                                    </td>
                                </tr>
                            `;
                        });
                    }
                    $('#configTableBody').html(html);
                    renderPagination(data.current, data.size, data.total, 'configPagination', loadConfigs);
                }
            });
        }

        // 打开新增配置模态框
        function openAddConfigModal() {
            $('#configModalTitle').text('新增配置');
            $('#configForm')[0].reset();
            $('#configId').val('');
            $('#configKey').prop('disabled', false);
            configModal.show();
        }

        // 打开编辑配置模态框
        function openEditConfigModal(id, key, value, type, remark) {
            $('#configModalTitle').text('编辑配置');
            $('#configId').val(id);
            $('#configKey').val(key).prop('disabled', true);
            $('#configValue').val(value);
            $('#configType').val(type || 'system');
            $('#configRemark').val(remark || '');
            configModal.show();
        }

        // 保存配置
        function saveConfig() {
            var id = $('#configId').val();
            var data = {
                configKey: $('#configKey').val(),
                configValue: $('#configValue').val(),
                configType: $('#configType').val(),
                remark: $('#configRemark').val()
            };

            if (!data.configKey || !data.configValue) {
                showError('请填写必填项');
                return;
            }

            var url = id ? '/api/admin/config/' + id : '/api/admin/config';

            var successCallback = function(res) {
                if (res.code === 200) {
                    showSuccess('保存成功');
                    configModal.hide();
                    loadConfigs(currentConfigPage);
                } else {
                    showError(res.msg || '操作失败');
                }
            };

            if (id) {
                apiPut(url, data, successCallback);
            } else {
                apiPost(url, data, successCallback);
            }
        }

        // 删除配置
        function deleteConfig(id) {
            showConfirm('确定要删除这个配置吗？', '确认删除', function() {
                apiDelete('/api/admin/config/' + id, function(res) {
                    if (res.code === 200) {
                        showSuccess('删除成功');
                        loadConfigs(currentConfigPage);
                    } else {
                        showError(res.msg || '删除失败');
                    }
                });
            });
        }

        // 加载操作日志
        function loadLogs() {
            apiGet('/api/admin/log/list?pageNum=1&pageSize=20', function(res) {
                if (res.code === 200) {
                    var html = '';
                    var data = res.data;
                    if (data && data.records) {
                        data.records.slice(0, 10).forEach(function(log) {
                            var statusHtml = log.status === 1
                                ? '<span class="badge bg-success">成功</span>'
                                : '<span class="badge bg-danger">失败</span>';
                            html += `
                                <tr>
                                    <td>${log.userId}</td>
                                    <td>${log.operationType}</td>
                                    <td>${log.operationDesc}</td>
                                    <td>${log.ipAddress}</td>
                                    <td>${log.operationTime ? log.operationTime.substring(0, 16) : ''}</td>
                                    <td>${statusHtml}</td>
                                </tr>
                            `;
                        });
                    }
                    $('#logTableBody').html(html);
                }
            });
        }

        // 搜索用户
        $('#searchUsername').on('input', function() {
            loadUsers(1);
        });
    </script>
    <script src="/static/js/layout.js"></script>
</body>
</html>
