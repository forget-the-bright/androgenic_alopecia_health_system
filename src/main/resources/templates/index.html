<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 毛发健康管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        .welcome-banner {
            background: var(--primary-gradient);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h3 {
            font-size: 36px;
            margin-bottom: 5px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-card p {
            color: var(--text-muted);
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="sidebar-toggle me-2" onclick="toggleSidebar()" title="切换侧边栏">
                    <span class="toggle-icon">⬅️</span>
                </button>
                <a class="navbar-brand" href="/index.html">毛发健康管理系统</a>
            </div>
            
            <div class="d-flex align-items-center">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <span class="theme-icon">🌙</span>
                </button>
                <div class="language-selector ms-2">
                    <select onchange="setLanguage(this.value)">
                        <option value="zh-CN">🇨🇳 中文</option>
                        <option value="en-US">🇺🇸 English</option>
                    </select>
                </div>
                <a class="nav-link" href="#" onclick="doLogout()">🚪 退出</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar d-none d-md-block">
                <nav class="nav flex-column">
                    <a class="nav-link active" href="/index.html">
                        <span class="icon">📊</span>
                        <span class="text">数据概览</span>
                    </a>
                    <a class="nav-link" href="/hair-data.html">
                        <span class="icon">📷</span>
                        <span class="text">毛发数据</span>
                    </a>
                    <a class="nav-link" href="/ai-analysis.html">
                        <span class="icon">🤖</span>
                        <span class="text">AI 分析</span>
                    </a>
                    <a class="nav-link" href="/medicine.html">
                        <span class="icon">💊</span>
                        <span class="text">用药管理</span>
                    </a>
                    <a class="nav-link" href="/profile.html">
                        <span class="icon">👤</span>
                        <span class="text">个人中心</span>
                    </a>
                    <a class="nav-link admin-link" href="/admin.html" style="display: none;">
                        <span class="icon">⚙️</span>
                        <span class="text">管理后台</span>
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 main-content">
                <div class="welcome-banner">
                    <h2>欢迎使用毛发健康管理系统</h2>
                    <p id="userWelcome"></p>
                </div>

                <div class="row">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <h3 id="photoCount">0</h3>
                            <p>上传照片数</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <h3 id="analysisCount">0</h3>
                            <p>AI 分析次数</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <h3 id="medicineCount">0</h3>
                            <p>用药方案数</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <h3 id="clockDays">0</h3>
                            <p>连续打卡天数</p>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>快速操作</h5>
                            </div>
                            <div class="card-body">
                                <a href="/hair-data.html" class="btn btn-outline-primary m-1">📷 上传照片</a>
                                <a href="/ai-analysis.html" class="btn btn-outline-success m-1">🤖 AI 分析</a>
                                <a href="/medicine.html" class="btn btn-outline-warning m-1">💊 今日打卡</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>最近动态</h5>
                            </div>
                            <div class="card-body" id="recentActivity">
                                <p class="text-muted">暂无最近动态</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="/static/js/api.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/layout.js"></script>
    <script>
        $(function() {
            checkLoginAsync(function(userInfo) {
                loadUserInfo(userInfo);
            });
            loadStatistics();
            checkAdminLink();
        });

        function loadUserInfo(userInfo) {
            $('#userWelcome').text('您好，' + (userInfo.realName || userInfo.username || '用户'));
        }

        function loadStatistics() {
            apiGet('/api/image/list', function(res) {
                if (res.code === 200) {
                    $('#photoCount').text(res.data?.length || 0);
                }
            });

            apiGet('/api/analysis/list', function(res) {
                if (res.code === 200) {
                    $('#analysisCount').text(res.data?.length || 0);
                }
            });

            apiGet('/api/medicine/list', function(res) {
                if (res.code === 200) {
                    $('#medicineCount').text(res.data?.length || 0);
                }
            });

            apiGet('/api/clock/all-statistics', function(res) {
                if (res.code === 200 && res.data && res.data.length > 0) {
                    var maxDays = 0;
                    res.data.forEach(function(stat) {
                        if (stat.consecutiveDays > maxDays) {
                            maxDays = stat.consecutiveDays;
                        }
                    });
                    $('#clockDays').text(maxDays);
                }
            });
        }
    </script>
</body>
</html>
