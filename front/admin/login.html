<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 雄脱健康管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-container { background: white; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); max-width: 420px; width: 100%; overflow: hidden; }
        .login-header { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; padding: 35px; text-align: center; }
        .login-header h2 { margin-bottom: 10px; font-weight: 600; }
        .login-body { padding: 40px; }
        .form-control:focus { border-color: #3498db; box-shadow: 0 0 0 0.2rem rgba(52,152,219,0.25); }
        .btn-login { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); border: none; padding: 12px; font-weight: 600; width: 100%; }
        .btn-login:hover { opacity: 0.9; }
        .input-group-text { background-color: #f8f9fa; border-right: none; }
        .input-group .form-control { border-left: none; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner-border text-light" role="status"></div></div>
    <div class="login-container">
        <div class="login-header">
            <h2><i class="fas fa-user-shield"></i> 管理后台</h2>
            <p class="mb-0">雄脱健康管理系统</p>
        </div>
        <div class="login-body">
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label class="form-label">管理员账号</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="请输入管理员账号" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-login">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_BASE_URL = 'http://localhost:8080';

        function showLoading() { $('#loadingOverlay').css('display', 'flex'); }
        function hideLoading() { $('#loadingOverlay').hide(); }
        function showSuccess(message) { Swal.fire({ icon: 'success', title: '成功', text: message, timer: 2000, showConfirmButton: false }); }
        function showError(message) { Swal.fire({ icon: 'error', title: '错误', text: message }); }

        async function handleLogin(event) {
            event.preventDefault();
            const username = $('#username').val().trim();
            const password = $('#password').val();
            
            showLoading();
            try {
                const response = await axios.post(`${API_BASE_URL}/api/admin/login`, {
                    username: username,
                    password: password
                }, { headers: { 'Content-Type': 'application/json' } });
                
                hideLoading();
                if (response.data && response.data.code === 200) {
                    const token = response.data.data?.token || response.data.data;
                    localStorage.setItem('adminToken', token);
                    showSuccess('登录成功，即将跳转...');
                    setTimeout(() => { window.location.href = 'admin_dashboard.html'; }, 1500);
                } else {
                    showError(response.data.message || '登录失败');
                }
            } catch (error) {
                hideLoading();
                console.error('Login error:', error);
                showError(error.response?.data?.message || '登录失败，请稍后重试');
            }
        }

        $(document).ready(function() {
            const token = localStorage.getItem('adminToken');
            if (token) { window.location.href = 'admin_dashboard.html'; }
        });
    </script>
</body>
</html>
