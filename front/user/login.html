<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 雄脱健康管理系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .auth-header h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }
        .auth-body {
            padding: 40px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .tab-nav {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab-nav button {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-nav button.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .input-group .form-control {
            border-left: none;
        }
        .input-group .form-control:focus {
            border-left: none;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <h2><i class="fas fa-user-md"></i> 雄脱健康管理系统</h2>
            <p class="mb-0">科学管理 · 精准治疗 · 重拾自信</p>
        </div>
        <div class="auth-body">
            <!-- Tab Navigation -->
            <div class="tab-nav">
                <button class="active" onclick="switchTab('login')">登录</button>
                <button onclick="switchTab('register')">注册</button>
            </div>

            <!-- Login Form -->
            <div id="loginTab" class="tab-content active">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="tel" class="form-control" id="loginPhone" placeholder="请输入手机号" required pattern="1[3-9]\d{9}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码" required minlength="6">
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">记住我</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerTab" class="tab-content">
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="tel" class="form-control" id="registerPhone" placeholder="请输入手机号" required pattern="1[3-9]\d{9}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="registerPassword" placeholder="请输入密码（6-20位）" required minlength="6" maxlength="20">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入密码" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">昵称</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="registerNickname" placeholder="请输入昵称">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-user-plus"></i> 注册
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // API 基础地址
        const API_BASE_URL = 'http://localhost:8080';
        
        // 切换 Tab
        function switchTab(tab) {
            $('.tab-nav button').removeClass('active');
            $('.tab-content').removeClass('active');
            
            if (tab === 'login') {
                $('#loginTab').addClass('active');
                $('.tab-nav button:eq(0)').addClass('active');
            } else {
                $('#registerTab').addClass('active');
                $('.tab-nav button:eq(1)').addClass('active');
            }
        }

        // 显示 Loading
        function showLoading() {
            $('#loadingOverlay').css('display', 'flex');
        }

        // 隐藏 Loading
        function hideLoading() {
            $('#loadingOverlay').hide();
        }

        // 显示成功提示
        function showSuccess(message) {
            Swal.fire({
                icon: 'success',
                title: '成功',
                text: message,
                timer: 2000,
                showConfirmButton: false
            });
        }

        // 显示错误提示
        function showError(message) {
            Swal.fire({
                icon: 'error',
                title: '错误',
                text: message
            });
        }

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();
            
            const phone = $('#loginPhone').val().trim();
            const password = $('#loginPassword').val();
            
            // 验证手机号
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(phone)) {
                showError('请输入正确的手机号');
                return;
            }
            
            // 验证密码
            if (password.length < 6) {
                showError('密码长度不能少于 6 位');
                return;
            }
            
            showLoading();
            
            try {
                // 调用登录接口 - 根据 Sa-Token 规范，使用 /api/user/login
                const response = await axios.post(`${API_BASE_URL}/api/user/login`, {
                    phone: phone,
                    password: password
                }, {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                hideLoading();
                
                if (response.data && response.data.code === 200) {
                    // 保存 token 到 localStorage
                    const token = response.data.data?.token || response.data.data;
                    localStorage.setItem('userToken', token);
                    localStorage.setItem('userInfo', JSON.stringify(response.data.data?.user || {}));
                    
                    showSuccess('登录成功，即将跳转...');
                    
                    setTimeout(() => {
                        window.location.href = 'user_center.html';
                    }, 1500);
                } else {
                    showError(response.data.message || '登录失败');
                }
            } catch (error) {
                hideLoading();
                console.error('Login error:', error);
                const errorMsg = error.response?.data?.message || error.message || '登录失败，请稍后重试';
                showError(errorMsg);
            }
        }

        // 处理注册
        async function handleRegister(event) {
            event.preventDefault();
            
            const phone = $('#registerPhone').val().trim();
            const password = $('#registerPassword').val();
            const confirmPassword = $('#confirmPassword').val();
            const nickname = $('#registerNickname').val().trim();
            
            // 验证手机号
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(phone)) {
                showError('请输入正确的手机号');
                return;
            }
            
            // 验证密码
            if (password.length < 6 || password.length > 20) {
                showError('密码长度应为 6-20 位');
                return;
            }
            
            // 验证密码一致性
            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }
            
            showLoading();
            
            try {
                // 调用注册接口
                const response = await axios.post(`${API_BASE_URL}/api/user/register`, {
                    phone: phone,
                    password: password,
                    nickname: nickname || ''
                }, {
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                hideLoading();
                
                if (response.data && response.data.code === 200) {
                    showSuccess('注册成功，请登录');
                    
                    setTimeout(() => {
                        switchTab('login');
                        $('#loginPhone').val(phone);
                        $('#loginPassword').val(password);
                    }, 1500);
                } else {
                    showError(response.data.message || '注册失败');
                }
            } catch (error) {
                hideLoading();
                console.error('Register error:', error);
                const errorMsg = error.response?.data?.message || error.message || '注册失败，请稍后重试';
                showError(errorMsg);
            }
        }

        // 页面加载时检查是否已登录
        $(document).ready(function() {
            const token = localStorage.getItem('userToken');
            if (token) {
                // 已登录，跳转到个人中心
                window.location.href = 'user_center.html';
            }
        });
    </script>
</body>
</html>
